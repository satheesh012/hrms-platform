eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka
  instance:
    prefer-ip-address: true

# ✅ Configurable CRON Expressions
cron:
  payroll: "*/30 * * * * ?"
  attendance:
    daily: "*/30 * * * * ?"
    weekly: "*/30 * * * * ?"
  reminders:
    leaves: "*/30 * * * * ?"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.cloud.openfeign: DEBUG


