name: Build Microservices

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Services
        run: |
          mvn -f API-Gateway/pom.xml clean package -DskipTests
          mvn -f Attendance-Service/pom.xml clean package -DskipTests
          mvn -f Auth-Service/pom.xml clean package -DskipTests
          mvn -f Employee-Service/pom.xml clean package -DskipTests
          mvn -f Department-Service/pom.xml clean package -DskipTests
          mvn -f Leave-Service/pom.xml clean package -DskipTests
          mvn -f Notification-Service/pom.xml clean package -DskipTests
          mvn -f Payroll-Service/pom.xml clean package -DskipTests
          mvn -f Scheduler-Service/pom.xml clean package -DskipTests
          mvn -f Service-Registry/pom.xml clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:$TAG ./API-Gateway
          docker build -t ${{ secrets.DOCKER_USERNAME }}/attendance-service:$TAG ./Attendance-Service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:$TAG ./Auth-Service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/employee-service:$TAG ./Employee-Service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/department-service:$TAG ./Department-Service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/leave-service:$TAG ./Leave-Service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:$TAG ./Notification-Service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/payroll-service:$TAG ./Payroll-Service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/scheduler-service:$TAG ./Scheduler-Service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/service-registry:$TAG ./Service-Registry

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:$TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/attendance-service:$TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:$TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-service:$TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/department-service:$TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/leave-service:$TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:$TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/payroll-service:$TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/scheduler-service:$TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/service-registry:$TAG