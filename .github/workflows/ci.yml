name: Build Microservices

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build API Gateway
        run: mvn -f API-Gateway/pom.xml clean package -DskipTests

      - name: Build Attendance Service
        run: mvn -f Attendance-Service/pom.xml clean package -DskipTests

      - name: Build Auth Service
        run: mvn -f Auth-Service/pom.xml clean package -DskipTests

      - name: Build Employee Service
        run: mvn -f Employee-Service/pom.xml clean package -DskipTests

      - name: Build Department Service
        run: mvn -f Department-Service/pom.xml clean package -DskipTests

      - name: Build Leave Service
        run: mvn -f Leave-Service/pom.xml clean package -DskipTests

      - name: Build Notification Service
        run: mvn -f Notification-Service/pom.xml clean package -DskipTests

      - name: Build Payroll Service
        run: mvn -f Payroll-Service/pom.xml clean package -DskipTests

      - name: Build Scheduler Service
        run: mvn -f Scheduler-Service/pom.xml clean package -DskipTests

      - name: Build Service Registry
        run: mvn -f Service-Registry/pom.xml clean package -DskipTests

      - name: Build Docker images
        run: |
          docker build --no-cache -t api-gateway ./API-Gateway
          docker build --no-cache -t attendance-service ./Attendance-Service
          docker build --no-cache -t auth-service ./Auth-Service
          docker build --no-cache -t employee-service ./Employee-Service
          docker build --no-cache -t department-service ./Department-Service
          docker build --no-cache -t leave-service ./Leave-Service
          docker build --no-cache -t notification-service ./Notification-Service
          docker build --no-cache -t payroll-service ./Payroll-Service
          docker build --no-cache -t scheduler-service ./Scheduler-Service
          docker build --no-cache -t service-registry ./Service-Registry

      - name: Verify JAR files
        run: |
          ls -la API-Gateway/target
          ls -la Attendance-Service/target
          ls -la Auth-Service/target
          ls -la Department-Service/target
          ls -la Employee-Service/target

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push images
        run: |
          docker tag api-gateway ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest

          docker tag attendance-service ${{ secrets.DOCKER_USERNAME }}/attendance-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/attendance-service:latest

          docker tag auth-service ${{ secrets.DOCKER_USERNAME }}/auth-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

          docker tag department-service ${{ secrets.DOCKER_USERNAME }}/department-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/department-service:latest

          docker tag employee-service ${{ secrets.DOCKER_USERNAME }}/employee-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-service:latest

          docker tag leave-service ${{ secrets.DOCKER_USERNAME }}/leave-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/leave-service:latest

          docker tag notification-service ${{ secrets.DOCKER_USERNAME }}/notification-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest

          docker tag payroll-service ${{ secrets.DOCKER_USERNAME }}/payroll-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/payroll-service:latest

          docker tag scheduler-service ${{ secrets.DOCKER_USERNAME }}/scheduler-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/scheduler-service:latest

          docker tag service-registry ${{ secrets.DOCKER_USERNAME }}/service-registry:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/service-registry:latest